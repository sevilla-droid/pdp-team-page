  name: Update last modified date

  on:
    push:
      branches: [main]

  jobs:
    update-date:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4                                                                                                                                                                    
                                                                                                                                                                                                       
        - name: Update last updated date                                                                                                                                                               
          run: |                                                                                                                                                                                       
            DATE=$(date +'%B %-d, %Y')                                                                                                                                                                 
            sed -i "s/Last updated .*/Last updated $DATE<\/span>/" index.html                                                                                                                          
                                                                                                                                                                                                       
        - name: Commit updated date                                                                                                                                                                    
          run: |                                                                                                                                                                                       
            git config user.name "github-actions"
            git config user.email "github-actions@github.com"                                                                                                                                          
            git add index.html                                                                                                                                                                         
            git diff --staged --quiet || git commit -m "Update last modified date"     
